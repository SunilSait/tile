<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — the tile you're looking for seems to be missing from our collection.">
    <title>404 — Page Not Found | Tessera</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Crect x='4' y='4' width='92' height='92' rx='8' stroke='%232B6B5A' stroke-width='2' stroke-opacity='0.4' fill='none'/%3E%3Crect x='20' y='20' width='25' height='25' rx='3' fill='%232B6B5A' fill-opacity='0.25' stroke='%232B6B5A' stroke-width='1.5'/%3E%3Crect x='55' y='55' width='25' height='25' rx='3' fill='%232B6B5A' fill-opacity='0.25' stroke='%232B6B5A' stroke-width='1.5'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#2B6B5A',secondary:'#1C1C2E'}}}}</script>
</head>
<body>
<div class="auth-page" id="error-page">
    <div class="auth-top-icons">
        <button class="icon-btn dark-toggle" title="Toggle Dark Mode">
            <i class="fas fa-moon"></i>
        </button>
        <button class="icon-btn rtl-toggle" title="Toggle RTL">
            <i class="fas fa-exchange-alt"></i>
        </button>
    </div>

    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div class="absolute w-[600px] h-[600px] rounded-full" style="background:radial-gradient(circle,rgba(43,107,90,0.10) 0%,transparent 70%);top:-200px;right:-200px;"></div>
        <div class="absolute w-[400px] h-[400px] rounded-full" style="background:radial-gradient(circle,rgba(28,28,46,0.06) 0%,transparent 70%);bottom:-150px;left:-150px;"></div>
        <div class="absolute inset-0" style="background-image:linear-gradient(rgba(43,107,90,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(43,107,90,0.03) 1px,transparent 1px);background-size:48px 48px;"></div>
    </div>

    <div class="auth-card animate-on-scroll zoom-in text-center" style="max-width:520px;">
        <a href="index.html" class="auth-logo">
            <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="4" width="92" height="92" rx="8" stroke="var(--logo-primary)" stroke-width="2" stroke-opacity="0.4" fill="none"/>
                <rect x="20" y="20" width="25" height="25" rx="3" fill="var(--logo-primary)" fill-opacity="0.25" stroke="var(--logo-primary)" stroke-width="1.5"/>
                <rect x="55" y="55" width="25" height="25" rx="3" fill="var(--logo-primary)" fill-opacity="0.25" stroke="var(--logo-primary)" stroke-width="1.5"/>
                <path d="M38 42 L62 42 M50 42 L50 65" stroke="var(--logo-primary)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span style="font-family:'Playfair Display',serif;">Tessera</span>
        </a>

        <!-- Mosaic 404 display -->
        <div class="my-8">
            <div class="flex items-center justify-center gap-3 mb-4">
                <div class="grid grid-cols-3 gap-1">
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/20"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/40"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/20"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/40"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/60"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/40"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/20"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/40"></div>
                    <div class="w-6 h-6 rounded-sm bg-[#2B6B5A]/20"></div>
                </div>
            </div>
            <h1 class="text-8xl font-bold emerald-text mb-2" style="font-family:'Playfair Display',serif;">404</h1>
        </div>

        <h2 class="text-xl font-bold mb-3" style="font-family:'Playfair Display',serif;">This Tile Seems Missing</h2>
        <p class="text-sm text-neutral-500 dark:text-neutral-400 mb-8 leading-relaxed max-w-sm mx-auto">
            The page you're looking for doesn't exist in our collection. It may have been moved, renamed, or is temporarily unavailable.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="index.html" class="btn btn-primary btn-shine">
                <i class="fas fa-home text-xs"></i> Back to Home
            </a>
            <a href="contact.html" class="btn btn-secondary">
                Contact Support
            </a>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
